<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Library Management System - Login</title>
    <link rel="stylesheet" href="lb.css/lbmstyle.css">
    <script src="https://unpkg.com/html5-qrcode"></script>
</head>
<body>
    <div class="container">
        <div class="login-box">
            <h1 class="logo">📚 LibraryMS</h1>
            
            <!-- Login Form -->
            <form id="loginForm" class="form">
                <div class="form-group">
                    <label for="email">Email ID</label>
                    <input type="email" id="email" name="email" required>
                </div>
                
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" required>
                </div>
                
                <div class="form-options">
                    <label class="checkbox">
                        <input type="checkbox" id="remember"> Remember me
                    </label>
                    <a href="#" class="forgot-link">Forgot password?</a>
                </div>
                
                <button type="submit" class="btn-login">LOGIN</button>
            </form>
            
            <div class="signup-link">
                Don't have an account? <a href="#" onclick="showSignup()">Sign up</a> | <a href="#" onclick="showBarcodeLogin()">Scan Barcode</a>
            </div>
        </div>

        <!-- Barcode Login (Hidden by default) -->
        <div class="barcode-box" style="display: none;">
            <h1 class="logo">📸 Camera Scanner</h1>
            <p style="text-align: center; margin-bottom: 1.5rem; color: var(--text-muted);">Center your barcode in the camera view</p>
            
            <div id="reader" style="width: 100%; border-radius: 12px; overflow: hidden; margin-bottom: 1.5rem; border: 2px solid var(--border);"></div>
            
            <form id="barcodeLoginForm" class="form">
                <input type="hidden" id="barcodeInput">
                <button type="submit" id="manualSubmit" style="display: none;">CHECK IN</button>
            </form>
            
            <div class="signup-link">
                <a href="#" onclick="stopScanner()">Back to Credentials</a>
            </div>
        </div>

        <!-- Signup Form (Hidden by default) -->
        <div class="signup-box" style="display: none;">
            <h2>Create Account</h2>
            <form id="signupForm" class="form">
                <div class="form-group">
                    <label for="signupName">Full Name</label>
                    <input type="text" id="signupName" required>
                </div>
                
                <div class="form-group">
                    <label for="signupEmail">Email ID</label>
                    <input type="email" id="signupEmail" required>
                </div>
                
                <div class="form-group">
                    <label for="signupPhone">Phone Number</label>
                    <input type="tel" id="signupPhone">
                </div>
                
                <div class="form-group">
                    <label for="signupAddress">Address</label>
                    <textarea id="signupAddress" rows="2"></textarea>
                </div>
                
                <div class="form-group">
                    <label for="signupPassword">Password</label>
                    <input type="password" id="signupPassword" required>
                </div>
                
                <div class="form-group">
                    <label for="confirmPassword">Confirm Password</label>
                    <input type="password" id="confirmPassword" required>
                </div>
                
                <button type="submit" class="btn-login">SIGN UP</button>
            </form>
            
            <div class="signup-link">
                Already have an account? <a href="#" onclick="showLogin()">Login</a>
            </div>
        </div>
    </div>

    <div id="message" class="message"></div>

    <script src="lb.js/auth.js"></script>
</body>
</html>
