<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Issue/Return - LibraryMS</title>
    <link rel="stylesheet" href="lb.css/lbmstyle.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap">
</head>
<body>
    <div id="message" class="message"></div>
    
    <div class="dashboard">
        <!-- Sidebar -->
        <div class="sidebar">
            <div class="sidebar-header">
                <h2>📚 LibraryMS</h2>
            </div>
            <ul class="nav-menu">
                <li><a href="lbdashboard.html">📊 Dashboard</a></li>
                <li><a href="lbbooks.html">📚 Books</a></li>
                <li><a href="lbusers.html">👥 Users</a></li>
                <li><a href="lbissues.html" class="active">📖 Issue/Return</a></li>
                <li><a href="lbreports.html">📑 Reports</a></li>
                <li><a href="#" onclick="logout()">🚪 Logout</a></li>
            </ul>
        </div>

        <!-- Main Content -->
        <div class="main-content">
            <div class="top-bar">
                <h1>Circulation Desk</h1>
                <div class="user-controls">
                    <button class="theme-toggle" onclick="toggleTheme()" id="themeBtn">
                        🌙 Dark Mode
                    </button>
                    <div class="user-info">
                        <span id="userName">Welcome, Admin</span>
                    </div>
                </div>
            </div>

            <!-- Issue Book Form -->
            <div class="card">
                <h2>📖 Issue New Book</h2>
                <form id="issueBookForm" class="form-grid">
                    <div class="form-group">
                        <label>Select Book *</label>
                        <select id="issueBookId" required>
                            <option value="">Choose a book...</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Select User *</label>
                        <select id="issueUserId" required>
                            <option value="">Choose a user...</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Due Date *</label>
                        <input type="date" id="issueDueDate" required>
                    </div>
                    <div class="form-group full-width">
                        <button type="submit" class="btn-primary" style="width: auto; padding: 0.75rem 2.5rem;">Issue Book</button>
                    </div>
                </form>
            </div>

            <!-- Current Issues -->
            <div class="card">
                <h2>📦 Active Issues</h2>
                <div style="overflow-x: auto;">
                    <table class="data-table" id="issuesTable">
                        <thead>
                            <tr>
                                <th>Book</th>
                                <th>User</th>
                                <th>Issue Date</th>
                                <th>Due Date</th>
                                <th>Status</th>
                                <th>Fine</th>
                                <th>Action</th>
                            </tr>
                        </thead>
                        <tbody>
                            <!-- Data populated via JS -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script src="lb.js/auth.js"></script>
    <script src="lb.js/issues.js"></script>
</body>
</html>
